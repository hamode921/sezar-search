<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #080808; --red: #ef4444; --green: #22c55e; }
        #zoom-wrapper { width: 100vw; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #zoom-container { transition: transform 0.3s ease; transform-origin: top center; width: 100%; display: flex; flex-direction: column; align-items: center; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-x: hidden; }
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; outline: none; border-radius: 5px; font-size: 18px; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; }
        #search-screen, #scanner-screen, #whale-hunt-screen, #radar-ui { display: none; width: 100%; max-width: 450px; text-align: center; margin-top: 20px; }
        .nav-tabs { display: flex; gap: 5px; width: 95%; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px 5px; border-radius: 8px; border: 1px solid var(--gold); background: #000; color: var(--gold); font-weight: bold; cursor: pointer; font-size: 11px; }
        .tab-btn.active { background: var(--gold); color: #000; }
        .scan-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .hunt-tag { background: rgba(34, 197, 94, 0.1); color: var(--green); border: 1px solid var(--green); font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 900; }
        .dump-tag { background: rgba(239, 68, 68, 0.1); color: var(--red); border: 1px solid var(--red); font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 900; }
    </style>
</head>
<body onload="checkAuth()">
<div id="zoom-wrapper">
    <div id="zoom-container">
        <div id="auth-screen" class="lock-box">
            <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 تفعيل SEZAR-PHANTOM PRO</div>
            <input type="password" id="pass-key" class="pass" placeholder="•••••">
            <button onclick="activate()" class="login-btn">تسجيل دخول</button>
            <div id="error-msg" style="color: var(--red); font-size: 12px; margin-top: 10px; display: none;"></div>
        </div>

        <div id="whale-hunt-screen">
            <div class="nav-tabs">
                <button class="tab-btn" onclick="switchTab('search')">🔍 بحث</button>
                <button class="tab-btn active" onclick="switchTab('whale-hunt')">🐋 صيد الحيتان</button>
            </div>
            <div id="whale-hunt-list"></div>
        </div>
        
        </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY", authDomain: "sezar-phantom-auth.firebaseapp.com", projectId: "sezar-phantom-auth", storageBucket: "sezar-phantom-auth.firebasestorage.app", messagingSenderId: "112991314655", appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function activate() { 
        const k = document.getElementById('pass-key').value;
        const err = document.getElementById('error-msg');
        if(!k) return;
        try {
            const doc = await db.collection("users").doc(k).get();
            if (doc.exists) { 
                localStorage.setItem('sz_ultimate_v1_key', k); 
                showSearch(); 
            } else { 
                err.innerText = "❌ الكود غير صحيح أو منتهي"; 
                err.style.display = 'block'; 
            }
        } catch(e) { err.innerText = "⚠️ خطأ في الاتصال"; err.style.display = 'block'; }
    }

    async function updateWhaleHunt() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            const data = await res.json();
            const list = document.getElementById('whale-hunt-list');
            
            let candidates = data.filter(c => parseFloat(c.quoteVolume) > 10000000)
            .map(c => {
                const vol = parseFloat(c.quoteVolume);
                const chg = parseFloat(c.priceChangePercent);
                // رادار الانهيار: هبوط حاد مع فوليوم مرتفع جداً
                let isDump = chg < -6 && vol > 50000000;
                let pumpScore = (vol / 50000000) - Math.abs(chg);
                return { ...c, pumpScore, isDump };
            }).sort((a,b) => b.pumpScore - a.pumpScore).slice(0, 10);

            let html = '';
            candidates.forEach(c => {
                html += `<div class="scan-item">
                    <div style="text-align:right">
                        <div style="color:var(--gold); font-weight:bold;">
                            ${c.isDump ? '⚠️ ' : '🐋 '}${c.symbol}
                            ${c.isDump ? '<span class="dump-tag">DUMP ALERT 📉</span>' : '<span class="hunt-tag">ACCUMULATION 🔥</span>'}
                        </div>
                        <div style="color:${c.isDump ? 'var(--red)' : 'var(--green)'}; font-size:10px;">
                            ${c.isDump ? 'خروج فوراً - انهيار سيولة' : 'انفجار قريب: +5% ~ +15%'}
                        </div>
                    </div>
                    <button style="background:var(--green); border:none; padding:5px 10px; border-radius:5px;">صيد 🎯</button>
                </div>`;
            });
            list.innerHTML = html;
        } catch (e) {}
    }

    function checkAuth() { if(localStorage.getItem('sz_ultimate_v1_key')) showSearch(); }
    function showSearch() { document.getElementById('auth-screen').style.display = 'none'; switchTab('whale-hunt'); }
    function switchTab(tab) { 
        document.getElementById('whale-hunt-screen').style.display = tab === 'whale-hunt' ? 'block' : 'none'; 
        if(tab === 'whale-hunt') updateWhaleHunt();
    }
</script>
</body>
</html>
