<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEZAR-PHANTOM PRO ULTIMATE - TIERS MODE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #080808; --red: #ef4444; --green: #22c55e; --alpha: #fbbf24; } 
        #zoom-wrapper { width: 100vw; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #zoom-container { transition: transform 0.3s ease; transform-origin: top center; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .inline-btn { background: rgba(251, 191, 36, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 2px 6px; border-radius: 4px; font-size: 10px; cursor: pointer; vertical-align: middle; margin: 0 5px; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-x: hidden; transition: background 0.3s; }
        
        .danger-blink { animation: red-flash 0.6s infinite; }
        @keyframes red-flash { 0% { box-shadow: inset 0 0 50px #450a0a; } 50% { box-shadow: inset 0 0 100px #ef4444; } 100% { box-shadow: inset 0 0 50px #450a0a; } }

        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; }
        .secure-note { color: #888; font-size: 11px; margin-bottom: 15px; line-height: 1.6; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; outline: none; border-radius: 5px; font-size: 18px; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; margin-bottom: 20px; }
        #search-screen, #alpha-screen, #scanner-screen, #whale-hunt-screen, #pump-dump-screen { display: none; width: 100%; max-width: 450px; text-align: center; margin-top: 20px; }
        .sezar-brand { margin-bottom: 30px; }
        .sezar-brand .sub-text { font-size: 28px; font-weight: bold; color: var(--gold); text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px; width: 95%; border-radius: 15px; font-size: 16px; outline: none; text-align: center; margin-bottom: 30px; }
        .coin-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #radar-ui { display: none; width: 100%; max-width: 450px; padding-bottom: 80px; position: relative; }
        .header { border: 1px solid var(--gold); padding: 5px; text-align: center; margin-bottom: 15px; border-radius: 5px; position: relative; }
        .back-btn { position: absolute; left: 8px; top: 8px; background: var(--gold); color: #000; border: none; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .price-box { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 32px; font-weight: 900; margin-bottom: 5px; background: #0a0a0a; color: #00d2ff; }
        #chart-container { width: 100%; height: 350px; border: 1px solid #222; border-radius: 10px; background: #000; margin: 15px 0; overflow: hidden; position: relative; }
        #chart-frame { width: 100%; height: 100%; border: none; }
        .chart-wall-line { position: absolute; left: 0; width: 100%; height: 2px; z-index: 10; pointer-events: none; transition: top 0.3s ease; }
        .timer-text { text-align:center; font-size:10px; color: var(--gold); margin-bottom: 12px; font-weight: bold; }
        .nav-tabs { display: flex; gap: 5px; width: 95%; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 80px; padding: 10px 5px; border-radius: 8px; border: 1px solid var(--gold); background: #000; color: var(--gold); font-weight: bold; cursor: pointer; font-size: 11px; }
        .tab-btn.active { background: var(--gold) !important; color: #000 !important; }
        .tab-locked { opacity: 0.3; filter: grayscale(1); }
        .scan-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .contact-dev { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; z-index: 100; }
        .contact-dev a { color: var(--gold); text-decoration: none; font-size: 11px; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 5px; font-weight: bold; }
        /* استكمال الستايلات المتبقية... */
    </style>
</head>
<body onload="checkAuth()">
<div id="zoom-wrapper">
    <div id="zoom-container">
        <div id="auth-screen" class="lock-box">
            <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 Activate SEZAR-PHANTOM PRO</div>
            <input type="password" id="pass-key" class="pass" placeholder="•••••">
            <button onclick="activate()" class="login-btn">LOGIN</button>
            <div id="error-msg" style="color: var(--red); font-size: 12px; margin-top: 10px; display: none; font-weight: bold;"></div>
        </div>

        <div id="alpha-screen">
            <div class="nav-tabs" id="tabs-alpha"></div>
            <div id="alpha-list"></div>
        </div>
        <div id="search-screen">
            <div class="nav-tabs" id="tabs-search"></div>
            <input type="text" class="search-input" id="search-input" placeholder="🔍 Search..." oninput="searchCoins()">
            <div id="results-list"></div>
        </div>
        <div id="scanner-screen">
            <div class="nav-tabs" id="tabs-scanner"></div>
            <div id="scanner-list"></div>
        </div>
        <div id="whale-hunt-screen">
            <div class="nav-tabs" id="tabs-whale"></div>
            <div id="whale-hunt-list"></div>
        </div>
        <div id="pump-dump-screen">
            <div class="nav-tabs" id="tabs-pump"></div>
            <div id="pump-dump-list"></div>
        </div>

        <div id="radar-ui">
            <div class="header">
                <button class="back-btn" onclick="goBack()">🔙 Back</button>
                <h2 id="radar-title">「 SEZAR-PHANTOM 」</h2>
                <p id="current-coin-name" style="font-size:11px; margin:0;">--</p>
            </div>
            <div class="price-box" id="coin-price">Loading...</div>
            <div id="chart-container"><iframe id="chart-frame" src=""></iframe></div>
            <div class="timer-text">LIQUIDITY UPDATE: <span id="timer">30</span>s</div>
            <div class="ice-card">
                <div style="font-size:11px; color:var(--ghost); font-weight:bold; margin-bottom:10px;">Iceberg Detector (Active)</div>
                <div id="iceberg-list"></div>
            </div>
            <div id="sig-box">WAITING...</div>
        </div>
    </div>
</div>

<div class="contact-dev"><a href="https://t.me/se44se" target="_blank">✈️ تليجرام</a><a href="mailto:sezarphantom@gmail.com">📧 الإيميل</a></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY", authDomain: "sezar-phantom-auth.firebaseapp.com", projectId: "sezar-phantom-auth", storageBucket: "sezar-phantom-auth.firebasestorage.app", messagingSenderId: "112991314655", appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let currentUserRank = 'silver';
    let pInt, lInt, iInt, tInt, scanInt, huntInt, pdInt, alphaInt;
    let currentSymbol = '', currentMode = 'spot', lastVolMap = new Map();

    // نظام الصلاحيات الجديد حسب طلبك
    function hasPermission(tabId) {
        const rules = {
            'search': ['silver', 'gold', 'diamond'],
            'scanner': ['gold', 'diamond'],
            'whale-hunt': ['gold', 'diamond'],
            'alpha': ['diamond'],
            'pump-dump': ['diamond']
        };
        return rules[tabId].includes(currentUserRank);
    }

    function renderTabs(active) {
        const tabs = [
            { id: 'alpha', label: '🪐 ALPHA' },
            { id: 'search', label: '🔍 SEARCH' },
            { id: 'scanner', label: '🛰️ SCANNER' },
            { id: 'whale-hunt', label: '🐋 WHALE' },
            { id: 'pump-dump', label: '🌋 PUMP/DUMP' }
        ];
        ['tabs-alpha', 'tabs-search', 'tabs-scanner', 'tabs-whale', 'tabs-pump'].forEach(cid => {
            const cont = document.getElementById(cid); if(!cont) return;
            cont.innerHTML = '';
            tabs.forEach(t => {
                const isLocked = !hasPermission(t.id);
                const btn = document.createElement('button');
                btn.className = `tab-btn ${t.id === active ? 'active' : ''} ${isLocked ? 'tab-locked' : ''}`;
                btn.innerText = t.label;
                btn.onclick = () => {
                    if(isLocked) alert('⚠️ للترقية والحصول على هذه الباقة، يرجى التواصل مع المطور أسفل الشاشة ⬇️');
                    else switchTab(t.id);
                };
                cont.appendChild(btn);
            });
        });
    }

    function switchTab(tab) {
        const screens = ['alpha-screen', 'search-screen', 'scanner-screen', 'whale-hunt-screen', 'pump-dump-screen', 'radar-ui'];
        screens.forEach(s => document.getElementById(s).style.display = s.startsWith(tab) ? 'block' : 'none');
        renderTabs(tab);
        stopIntervals();
        if(tab === 'alpha') alphaInt = setInterval(updateAlpha, 5000);
        if(tab === 'scanner') scanInt = setInterval(updateScanner, 5000);
        if(tab === 'whale-hunt') huntInt = setInterval(updateWhaleHunt, 10000);
        if(tab === 'pump-dump') pdInt = setInterval(updatePumpDump, 5000);
    }

    function startRadar(symbol, mode) {
        // الرادار والآيسبرغ متاح للجميع بمجرد اختيار العملة
        currentSymbol = symbol;
        ['alpha-screen', 'search-screen', 'scanner-screen', 'whale-hunt-screen', 'pump-dump-screen'].forEach(s => document.getElementById(s).style.display = 'none');
        document.getElementById('radar-ui').style.display = 'block';
        document.getElementById('current-coin-name').innerText = `[ ${symbol} ]`;
        const chartSymbol = mode === 'futures' ? `BINANCE:${symbol}PERP` : `BINANCE:${symbol}`;
        document.getElementById('chart-frame').src = `https://s.tradingview.com/widgetembed/?symbol=${chartSymbol}&interval=1&theme=dark`;
        
        stopIntervals();
        // تشغيل دوال الرادار والآيسبرغ هنا...
    }

    async function checkAuth() {
        const key = localStorage.getItem('sz_ultimate_v1_key');
        if (key) {
            const doc = await db.collection("users").doc(key).get();
            if (doc.exists) {
                currentUserRank = doc.data().rank || 'silver';
                showMain();
            }
        }
    }

    async function activate() {
        const k = document.getElementById('pass-key').value;
        const doc = await db.collection("users").doc(k).get();
        if (doc.exists) {
            currentUserRank = doc.data().rank || 'silver';
            localStorage.setItem('sz_ultimate_v1_key', k);
            showMain();
        } else {
            document.getElementById('error-msg').innerText = "❌ كود غير صحيح";
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function showMain() {
        document.getElementById('auth-screen').style.display = 'none';
        // التوجيه التلقائي حسب الباقة
        if(currentUserRank === 'silver') switchTab('search');
        else switchTab('alpha');
    }

    function goBack() { showMain(); }
    function stopIntervals() { clearInterval(pInt); clearInterval(lInt); clearInterval(iInt); clearInterval(tInt); clearInterval(scanInt); clearInterval(huntInt); clearInterval(pdInt); clearInterval(alphaInt); }
    
    // دوال البحث وعرض البيانات (نفس النسخة السابقة مع الحفاظ على الأداء)...
    function searchCoins() { /* ... */ }
    async function updateAlpha() { /* ... */ }
    async function updateScanner() { /* ... */ }
    async function updateWhaleHunt() { /* ... */ }
    async function updatePumpDump() { /* ... */ }
</script>
</body>
</html>
