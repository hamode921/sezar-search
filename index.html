<div id="whale-live-box" style="background: rgba(0, 0, 0, 0.6); border: 1px solid #333; border-radius: 10px; padding: 10px; margin-bottom: 15px;">
    <div style="font-size: 9px; color: var(--gold); text-align: center; font-weight: bold; margin-bottom: 8px; letter-spacing: 1px;">WHALE POSITIONS (LIVE) 🐳</div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 8px;">
        <div style="text-align: center; flex: 1;">
            <div style="font-size: 8px; color: var(--green);">LONG WHALES</div>
            <div id="long-whales-count" style="font-size: 14px; font-weight: bold; color: var(--green);">--</div>
            <div id="long-whales-vol" style="font-size: 8px; color: #888;">$0.00M</div>
        </div>
        
        <div style="text-align: center; flex: 1; border-left: 1px solid #222; border-right: 1px solid #222;">
            <div style="font-size: 8px; color: var(--gold);">NET RATIO</div>
            <div id="net-ratio-val" style="font-size: 12px; font-weight: bold; color: var(--gold);">FUTURES</div>
            <div id="net-ratio-perc" style="font-size: 8px; color: #888;">0.00%</div>
        </div>

        <div style="text-align: center; flex: 1;">
            <div style="font-size: 8px; color: var(--red);">SHORT WHALES</div>
            <div id="short-whales-count" style="font-size: 14px; font-weight: bold; color: var(--red);">--</div>
            <div id="short-whales-vol" style="font-size: 8px; color: #888;">$0.00M</div>
        </div>
    </div>
</div>

<script>
// --- أضف هذه الوظيفة داخل قسم السكريبت لتحديث بيانات الحيتان ---
function updateWhaleLive(buyP, tB, tS) {
    // حسابات وهمية ذكية بناءً على السيولة الحقيقية لمحاكاة الصورة
    const totalWhales = Math.floor(Math.random() * 50) + 80; 
    const longCount = Math.round(totalWhales * (buyP / 100));
    const shortCount = totalWhales - longCount;
    
    const longVol = (tB / 1000000).toFixed(2);
    const shortVol = (tS / 1000000).toFixed(2);

    document.getElementById('long-whales-count').innerText = longCount;
    document.getElementById('short-whales-count').innerText = shortCount;
    document.getElementById('long-whales-vol').innerText = `$${longVol}M`;
    document.getElementById('short-whales-vol').innerText = `$${shortVol}M`;
    document.getElementById('net-ratio-perc').innerText = `${buyP.toFixed(2)}%`;
}

// --- داخل وظيفة updateLiquidity() الموجودة عندك ---
// ابحث عن السطر الذي يحسب buyP و tB و tS وأضف الاستدعاء التالي:
// updateWhaleLive(buyP, tB, tS);
</script>
