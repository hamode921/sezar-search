<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #080808; --red: #ef4444; --green: #22c55e; }
        #zoom-wrapper { width: 100vw; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #zoom-container { transition: transform 0.3s ease; transform-origin: top center; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .inline-btn { background: rgba(251, 191, 36, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 2px 6px; border-radius: 4px; font-size: 10px; cursor: pointer; vertical-align: middle; margin: 0 5px; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-x: hidden; }
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; }
        .secure-note { color: #888; font-size: 11px; margin-bottom: 15px; line-height: 1.6; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; outline: none; border-radius: 5px; font-size: 18px; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; margin-bottom: 20px; }
        #search-screen, #scanner-screen { display: none; width: 100%; max-width: 450px; text-align: center; margin-top: 20px; }
        .sezar-brand { margin-bottom: 30px; }
        .sezar-brand .sub-text { font-size: 28px; font-weight: bold; color: var(--gold); text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px; width: 95%; border-radius: 15px; font-size: 16px; outline: none; text-align: center; margin-bottom: 30px; }
        .coin-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .coin-type { font-size: 9px; padding: 2px 5px; border-radius: 3px; margin-right: 5px; }
        #radar-ui { display: none; width: 100%; max-width: 450px; padding-bottom: 80px; position: relative; }
        .header { border: 1px solid var(--gold); padding: 5px; text-align: center; margin-bottom: 15px; border-radius: 5px; position: relative; }
        .back-btn { position: absolute; left: 8px; top: 8px; background: var(--gold); color: #000; border: none; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .price-box { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 32px; font-weight: 900; margin-bottom: 5px; background: #0a0a0a; color: #00d2ff; }
        #chart-container { width: 100%; height: 350px; border: 1px solid #222; border-radius: 10px; background: #000; margin: 15px 0; overflow: hidden; position: relative; }
        #chart-frame { width: 100%; height: 100%; border: none; }
        .chart-wall-line { position: absolute; left: 0; width: 100%; height: 2px; z-index: 10; pointer-events: none; transition: top 0.3s ease; }
        #sell-wall-line .wall-label { position: absolute; right: 80px; top: -18px; font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 3px; background: rgba(0,0,0,0.85); border: 1px solid currentColor; white-space: nowrap; }
        #buy-wall-line .wall-label { position: absolute; right: 80px; top: 2px; font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 3px; background: rgba(0,0,0,0.85); border: 1px solid currentColor; white-space: nowrap; }
        .timer-text { text-align:center; font-size:10px; color: var(--gold); margin-bottom: 12px; font-weight: bold; }
        #buy-sell-per { text-align:center; font-weight:bold; margin-bottom:10px; font-size: 14px; }
        #power-bar { text-align:center; margin-bottom:20px; display: flex; justify-content: center; gap: 4px; }
        .ball { width: 12px; height: 12px; border-radius: 50%; }
        .row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 13px; font-weight: bold; }
        .ice-card { background: var(--card); border: 1px solid var(--ghost); padding: 15px; border-radius: 12px; margin-top: 20px; width: 100%; box-sizing: border-box; }
        .ai-signal-box { background: linear-gradient(45deg, #080808, #111); border: 1px double var(--gold); border-radius: 10px; padding: 15px; margin: 15px 0; text-align: center; }
        #ai-decision { font-size: 18px; font-weight: 900; margin: 5px 0; }
        .ai-meta { display: flex; justify-content: space-around; font-size: 10px; color: #888; margin-top: 5px; }
        #sig-box { text-align: center; font-weight: bold; padding: 15px; margin-top: 30px; border-radius: 5px; font-size: 16px; }
        .sig-bullish { background: #064e3b; color: #22c55e; border: 1px solid #22c55e; }
        .sig-bearish { background: #450a0a; color: #ef4444; border: 1px solid #ef4444; }
        .nav-tabs { display: flex; gap: 10px; width: 95%; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--gold); background: #000; color: var(--gold); font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: #000; }
        .scan-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .contact-dev { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; z-index: 100; }
        .contact-dev a { color: var(--gold); text-decoration: none; font-size: 11px; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body onload="checkAuth()">

<div id="zoom-wrapper">
    <div id="zoom-container">
        <div id="auth-screen" class="lock-box">
            <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 تفعيل SEZAR-PHANTOM PRO</div>
            <input type="password" id="pass-key" class="pass" placeholder="أدخل كود التفعيل">
            <button onclick="activate()" class="login-btn">دخول</button>
            <div id="error-msg" style="color: var(--red); font-size: 12px; display: none;"></div>
        </div>

        <div id="search-screen">
            <div class="sezar-brand"><span class="sub-text">「 SEZAR-PHANTOM 」</span></div>
            <input type="text" class="search-input" id="search-input" placeholder="بحث عن عملة..." oninput="searchCoins()">
            <div id="results-list"></div>
        </div>

        <div id="radar-ui">
            <div class="header">
                <button class="back-btn" onclick="goBack()">🔙</button>
                <h2 id="radar-title">ANALYSIS LIVE</h2>
                <p id="current-coin-name"></p>
            </div>
            <div class="price-box" id="coin-price">...</div>
            
            <div id="chart-container">
                <iframe id="chart-frame" src=""></iframe>
            </div>

            <div class="ai-signal-box">
                <div id="ai-decision">ANALYZING...</div>
                <div class="ai-meta"><span>ACCURACY: <span id="ai-conf">--</span></span></div>
            </div>

            <div class="ice-card" style="border-color: var(--gold);">
                <div style="font-size:11px; color:var(--gold); font-weight:bold; margin-bottom:10px;">🐋 WHALE POSITIONS</div>
                <div style="display: flex; justify-content: space-between; text-align: center;">
                    <div><div style="color: #888; font-size: 9px;">LONG</div><div id="whale-longs" style="color: var(--green);">--</div></div>
                    <div><div style="color: #888; font-size: 9px;">RATIO</div><div id="whale-net">--</div></div>
                    <div><div style="color: #888; font-size: 9px;">SHORT</div><div id="whale-shorts" style="color: var(--red);">--</div></div>
                </div>
            </div>

            <div id="b-walls"></div>
            <div id="sig-box">...</div>
        </div>
    </div>
</div>

<script>
    // تم إصلاح الإعدادات هنا لضمان جلب البيانات
    const firebaseConfig = { 
        apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY", 
        authDomain: "sezar-phantom-auth.firebaseapp.com", 
        projectId: "sezar-phantom-auth" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentSymbol = 'BTCUSDT', currentPrice = 0, allCoins = [];

    function checkAuth() {
        const saved = localStorage.getItem('sz_key');
        if(saved) showSearch();
    }

    async function activate() {
        const k = document.getElementById('pass-key').value;
        if(k === "SEZAR2026") { // كود تجريبي أو اربطه بـ Firebase
            localStorage.setItem('sz_key', k);
            showSearch();
        } else {
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('error-msg').innerText = "الكود غير صحيح";
        }
    }

    async function showSearch() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('search-screen').style.display = 'block';
        const res = await fetch('https://api.binance.com/api/v3/ticker/price');
        allCoins = await res.json();
        searchCoins();
    }

    function searchCoins() {
        const q = document.getElementById('search-input').value.toUpperCase();
        const list = document.getElementById('results-list');
        list.innerHTML = '';
        allCoins.filter(c => c.symbol.includes(q) && c.symbol.endsWith('USDT')).slice(0, 10).forEach(c => {
            const div = document.createElement('div');
            div.className = 'coin-item';
            div.innerHTML = `<span>${c.symbol}</span><span>${parseFloat(c.price).toFixed(2)}</span>`;
            div.onclick = () => startRadar(c.symbol);
            list.appendChild(div);
        });
    }

    function startRadar(symbol) {
        currentSymbol = symbol;
        document.getElementById('search-screen').style.display = 'none';
        document.getElementById('radar-ui').style.display = 'block';
        document.getElementById('current-coin-name').innerText = symbol;
        document.getElementById('chart-frame').src = `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}&interval=1&theme=dark`;
        
        setInterval(updateData, 3000);
        updateData();
    }

    async function updateData() {
        // جلب السعر
        const pRes = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${currentSymbol}`);
        const pData = await pRes.json();
        document.getElementById('coin-price').innerText = "$" + parseFloat(pData.price).toLocaleString();

        // جلب بيانات الحيتان (Whales) من Binance Futures
        try {
            const wRes = await fetch(`https://fapi.binance.com/fapi/v1/topLongShortAccountRatio?symbol=${currentSymbol}&period=5m&limit=1`);
            const wData = await wRes.json();
            if(wData && wData.length > 0) {
                document.getElementById('whale-longs').innerText = (parseFloat(wData[0].longAccount)*100).toFixed(1) + "%";
                document.getElementById('whale-shorts').innerText = (parseFloat(wData[0].shortAccount)*100).toFixed(1) + "%";
                document.getElementById('whale-net').innerText = wData[0].longShortRatio;
            }
        } catch(e) { 
            // إذا كانت العملة سبوت فقط سيعرض N/A
            document.getElementById('whale-net').innerText = "SPOT ONLY";
        }
    }

    function goBack() {
        document.getElementById('radar-ui').style.display = 'none';
        document.getElementById('search-screen').style.display = 'block';
    }
</script>
</body>
</html>
