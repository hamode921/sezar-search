<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #080808; --red: #ef4444; --green: #22c55e; --alpha: #fbbf24; } 
        #zoom-wrapper { width: 100vw; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #zoom-container { transition: transform 0.3s ease; transform-origin: top center; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .inline-btn { background: rgba(251, 191, 36, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 2px 6px; border-radius: 4px; font-size: 10px; cursor: pointer; vertical-align: middle; margin: 0 5px; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-x: hidden; }
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; }
        .secure-note { color: #888; font-size: 11px; margin-bottom: 15px; line-height: 1.6; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; outline: none; border-radius: 5px; font-size: 18px; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; margin-bottom: 20px; }
        #search-screen, #alpha-screen, #scanner-screen, #whale-hunt-screen, #pump-dump-screen { display: none; width: 100%; max-width: 450px; text-align: center; margin-top: 20px; }
        .sezar-brand { margin-bottom: 30px; }
        .sezar-brand .sub-text { font-size: 28px; font-weight: bold; color: var(--gold); text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px; width: 95%; border-radius: 15px; font-size: 16px; outline: none; text-align: center; margin-bottom: 30px; }
        .coin-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .coin-type { font-size: 9px; padding: 2px 5px; border-radius: 3px; margin-right: 5px; }
        #radar-ui { display: none; width: 100%; max-width: 450px; padding-bottom: 80px; position: relative; }
        .header { border: 1px solid var(--gold); padding: 5px; text-align: center; margin-bottom: 15px; border-radius: 5px; position: relative; }
        .back-btn { position: absolute; left: 8px; top: 8px; background: var(--gold); color: #000; border: none; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .price-box { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 32px; font-weight: 900; margin-bottom: 5px; background: #0a0a0a; color: #00d2ff; }
        #chart-container { width: 100%; height: 350px; border: 1px solid #222; border-radius: 10px; background: #000; margin: 15px 0; overflow: hidden; position: relative; }
        #chart-frame { width: 100%; height: 100%; border: none; }
        .chart-wall-line { position: absolute; left: 0; width: 100%; height: 2px; z-index: 10; pointer-events: none; transition: top 0.3s ease; }
        #sell-wall-line .wall-label { position: absolute; right: 80px; top: -18px; font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 3px; background: rgba(0,0,0,0.85); border: 1px solid currentColor; white-space: nowrap; }
        #buy-wall-line .wall-label { position: absolute; right: 80px; top: 2px; font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 3px; background: rgba(0,0,0,0.85); border: 1px solid currentColor; white-space: nowrap; }
        .timer-text { text-align:center; font-size:10px; color: var(--gold); margin-bottom: 12px; font-weight: bold; }
        #buy-sell-per { text-align:center; font-weight:bold; margin-bottom:10px; font-size: 14px; }
        #power-bar { text-align:center; margin-bottom:20px; display: flex; justify-content: center; gap: 4px; }
        .ball { width: 12px; height: 12px; border-radius: 50%; }
        .whale-live-box { background: rgba(8, 8, 8, 0.9); border: 1px solid var(--gold); border-radius: 10px; padding: 12px; margin: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .whale-col { flex: 1; text-align: center; }
        .whale-label { font-size: 8px; color: #888; margin-bottom: 4px; }
        .whale-val { font-size: 14px; font-weight: bold; }
        .whale-sub { font-size: 9px; margin-top: 2px; }
        .row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 13px; font-weight: bold; }
        .ice-card { background: var(--card); border: 1px solid var(--ghost); padding: 15px; border-radius: 12px; margin-top: 20px; width: 100%; box-sizing: border-box; }
        .ai-signal-box { background: linear-gradient(45deg, #080808, #111); border: 1px double var(--gold); border-radius: 10px; padding: 15px; margin: 15px 0; text-align: center; }
        #ai-decision { font-size: 18px; font-weight: 900; margin: 5px 0; }
        .ai-meta { display: flex; justify-content: space-around; font-size: 10px; color: #888; margin-top: 5px; }
        #sig-box { text-align: center; font-weight: bold; padding: 15px; margin-top: 30px; border-radius: 5px; font-size: 16px; }
        .sig-bullish { background: #064e3b; color: #22c55e; border: 1px solid #22c55e; }
        .sig-bearish { background: #450a0a; color: #ef4444; border: 1px solid #ef4444; }
        .nav-tabs { display: flex; gap: 5px; width: 95%; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 80px; padding: 10px 5px; border-radius: 8px; border: 1px solid var(--gold); background: #000; color: var(--gold); font-weight: bold; cursor: pointer; font-size: 11px; }
        .tab-btn.active { background: var(--gold) !important; color: #000 !important; border: 1px solid var(--gold) !important; }
        .scan-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .contact-dev { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; z-index: 100; }
        .contact-dev a { color: var(--gold); text-decoration: none; font-size: 11px; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 5px; font-weight: bold; }
        @keyframes blink-gold { 0% { border-color: var(--gold); box-shadow: 0 0 12px var(--gold); } 50% { border-color: #555; box-shadow: none; } 100% { border-color: var(--gold); box-shadow: 0 0 12px var(--gold); } }
        .blink-border { animation: blink-gold 0.6s infinite; border-width: 2px !important; }
    </style>
</head>
<body onload="checkAuth()">
<div id="zoom-wrapper">
    <div id="zoom-container">
        <div id="auth-screen" class="lock-box">
            <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 تفعيل SEZAR-PHANTOM PRO</div>
            <input type="password" id="pass-key" class="pass" placeholder="•••••">
            <button onclick="activate()" class="login-btn">تسجيل دخول</button>
            <div id="error-msg" style="color: var(--red); font-size: 12px; margin-top: 10px; display: none; font-weight: bold;"></div>
        </div>

        <div id="alpha-screen">
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('alpha')">🪐 ألفا</button>
                <button class="tab-btn" onclick="switchTab('search')">🔍 بحث</button>
                <button class="tab-btn" onclick="switchTab('scanner')">🛰️ القناص</button>
                <button class="tab-btn" onclick="switchTab('whale-hunt')">🐋 صيد</button>
                <button class="tab-btn" onclick="switchTab('pump-dump')" style="color: var(--red);">🌋 PUMP</button>
            </div>
            <div id="alpha-list"></div>
        </div>

        <div id="search-screen">
            <div class="nav-tabs">
                <button class="tab-btn" onclick="switchTab('alpha')">🪐 ألفا</button>
                <button class="tab-btn active" onclick="switchTab('search')">🔍 بحث</button>
                <button class="tab-btn" onclick="switchTab('scanner')">🛰️ القناص</button>
                <button class="tab-btn" onclick="switchTab('whale-hunt')">🐋 صيد</button>
                <button class="tab-btn" onclick="switchTab('pump-dump')" style="color: var(--red);">🌋 PUMP</button>
            </div>
            <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث في العقود الآجلة..." oninput="searchCoins()">
            <div id="results-list"></div>
        </div>

        <div id="scanner-screen"><div id="scanner-list"></div></div>
        <div id="whale-hunt-screen"><div id="whale-hunt-list"></div></div>
        <div id="pump-dump-screen"><div id="pump-dump-list"></div></div>

        <div id="radar-ui">
            <div class="header">
                <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
                <h2 id="radar-title">「 SEZAR-PHANTOM 」</h2>
                <p id="current-coin-name" style="font-size:11px; margin:0;"></p>
            </div>
            <div class="price-box" id="coin-price">Loading...</div>
            <div id="chart-container">
                <iframe id="chart-frame" src=""></iframe>
                <div id="sell-wall-line" class="chart-wall-line" style="background: var(--red); display: none;"><span class="wall-label" style="color: var(--red);">SELL: <span id="sw-vol"></span></span></div>
                <div id="buy-wall-line" class="chart-wall-line" style="background: var(--green); display: none;"><span class="wall-label" style="color: var(--green);">BUY: <span id="bw-vol"></span></span></div>
            </div>
            <div class="timer-text">تحديث السيولة خلال: <span id="timer">30</span> ثانية</div>
            <div id="buy-sell-display" style="text-align:center; font-weight:bold; margin-bottom:10px;">BUY: --% | SELL: --%</div>
            <div id="power-bar" style="flex-direction: row-reverse;"></div>
            
            <div class="whale-live-box">
                <div class="whale-col"><div class="whale-label">SHORT WHALES</div><div id="sw-count-whale" class="whale-val" style="color:var(--red)">--</div></div>
                <div class="whale-col" style="border-left:1px solid #222; border-right:1px solid #222;"><div class="whale-label">NET RATIO</div><div id="net-perc" class="whale-sub" style="color:var(--gold)">0.0%</div></div>
                <div class="whale-col"><div class="whale-label">LONG WHALES</div><div id="lw-count" class="whale-val" style="color:var(--green)">--</div></div>
            </div>

            <div id="s-walls"></div>
            <div class="ai-signal-box">
                <div id="ai-decision">ANALYZING...</div>
                <div class="ai-meta"><span>TARGET: <span id="ai-target">--</span></span><span>ACCURACY: <span id="ai-conf">--</span></span></div>
            </div>
            <div id="b-walls" style="margin-top:20px;"></div>
            <div id="sig-box">ANALYZING...</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY", authDomain: "sezar-phantom-auth.firebaseapp.com", projectId: "sezar-phantom-auth", storageBucket: "sezar-phantom-auth.firebasestorage.app", messagingSenderId: "112991314655", appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentSymbol = 'BTCUSDT', allCoins = [], timeLeft = 30, currentPrice = 0, pInt, lInt, tInt, scanInt, huntInt, pdInt, alphaInt;

    function setZoom(scale) { const container = document.getElementById('zoom-container'); container.style.transform = `scale(${scale})`; container.style.width = (100 / scale) + '%'; }
    
    function switchTab(tab) {
        const screens = ['alpha-screen', 'search-screen', 'scanner-screen', 'whale-hunt-screen', 'pump-dump-screen', 'radar-ui'];
        screens.forEach(s => document.getElementById(s).style.display = (s.startsWith(tab)) ? 'block' : 'none');
        
        clearInterval(scanInt); clearInterval(huntInt); clearInterval(pdInt); clearInterval(alphaInt);
        if(tab === 'alpha') { updateAlpha(); alphaInt = setInterval(updateAlpha, 5000); }
        if(tab === 'scanner') { updateScanner(); scanInt = setInterval(updateScanner, 5000); }
        if(tab === 'whale-hunt') { updateWhaleHunt(); huntInt = setInterval(updateWhaleHunt, 10000); }
        if(tab === 'pump-dump') { updatePumpDump(); pdInt = setInterval(updatePumpDump, 5000); }
    }

    // مصدر واحد موحد: Binance Futures
    const BASE_URL = 'https://fapi.binance.com/fapi/v1';

    async function updateAlpha() {
        const res = await fetch(`${BASE_URL}/ticker/24hr`); const data = await res.json();
        let html = '';
        data.filter(c => parseFloat(c.quoteVolume) > 10000000).slice(0, 10).forEach(c => {
            html += `<div class="scan-item"><div><span style="color:var(--gold); font-weight:bold;">🪐 ${c.symbol}</span></div><button onclick="startRadar('${c.symbol}')" style="background:var(--gold); border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">قنص 🎯</button></div>`;
        });
        document.getElementById('alpha-list').innerHTML = html;
    }

    // بدء الرادار بمصدر حقيقي 100%
    function startRadar(symbol) {
        currentSymbol = symbol; switchTab('radar');
        document.getElementById('current-coin-name').innerText = `[ ${symbol} ] - FUTURES`;
        document.getElementById('chart-frame').src = `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}PERP&interval=1&theme=dark`;
        
        stopIntervals();
        updatePrice(); updateLiquidity();
        pInt = setInterval(updatePrice, 1000); 
        lInt = setInterval(updateLiquidity, 5000);
        tInt = setInterval(() => { timeLeft--; if(timeLeft<0) timeLeft=30; document.getElementById('timer').innerText = timeLeft; }, 1000);
    }

    async function updatePrice() { 
        try {
            const res = await fetch(`${BASE_URL}/ticker/price?symbol=${currentSymbol}`); const data = await res.json();
            currentPrice = parseFloat(data.price);
            document.getElementById('coin-price').innerText = '$' + currentPrice.toLocaleString(undefined, {minimumFractionDigits: 2});
        } catch(e) {}
    }

    // قلب النظام: سحب السيولة الحقيقية من الـ Order Book
    async function updateLiquidity() {
        try {
            const res = await fetch(`${BASE_URL}/depth?symbol=${currentSymbol}&limit=1000`); const data = await res.json();
            let bids = data.bids.map(b => ({p: parseFloat(b[0]), v: parseFloat(b[1])}));
            let asks = data.asks.map(a => ({p: parseFloat(a[0]), v: parseFloat(a[1])}));
            
            let tB = bids.reduce((s,b)=>s+(b.p*b.v),0), tS = asks.reduce((s,a)=>s+(a.p*a.v),0);
            let buyP = (tB/(tB+tS)*100);
            
            document.getElementById('buy-sell-display').innerText = `BUY: ${buyP.toFixed(1)}% | SELL: ${(100-buyP).toFixed(1)}%`;
            document.getElementById('net-perc').innerText = buyP.toFixed(1) + "%";
            
            // حساب الحيتان بناءً على السيولة الفعلية (كل 50 ألف دولار = حوت واحد تمثيلي)
            document.getElementById('lw-count').innerText = Math.floor(tB / 50000);
            document.getElementById('sw-count-whale').innerText = Math.floor(tS / 50000);

            let buyBalls = Math.round(buyP / 10);
            document.getElementById('power-bar').innerHTML = '<div class="ball" style="background:var(--green)"></div>'.repeat(buyBalls) + '<div class="ball" style="background:var(--red)"></div>'.repeat(10-buyBalls);
            
            let topAsk = asks.sort((a,b) => (b.v*b.p) - (a.v*a.p))[0], topBid = bids.sort((a,b) => (b.v*b.p) - (a.v*a.p))[0];
            drawWallLine(topAsk, 'sell'); drawWallLine(topBid, 'buy');

            const aiDec = document.getElementById('ai-decision'), sig = document.getElementById('sig-box');
            if(buyP > 55) { aiDec.innerText = "🟢 STRONG BUY"; sig.className = "sig-bullish"; sig.innerText = "SIGNAL: BULLISH"; }
            else if(buyP < 45) { aiDec.innerText = "🔴 STRONG SELL"; sig.className = "sig-bearish"; sig.innerText = "SIGNAL: BEARISH"; }
            else { aiDec.innerText = "🟡 SIDEWAYS"; sig.innerText = "ANALYZING..."; }
        } catch (e) {}
    }

    function drawWallLine(wall, type) {
        const line = document.getElementById(type + '-wall-line'), volText = document.getElementById(type === 'sell' ? 'sw-vol' : 'bw-vol');
        if (!wall || !currentPrice) return;
        let range = currentPrice * 0.005, diff = wall.p - currentPrice, pos = 175 - (diff / range) * 175;
        if (pos > -10 && pos < 360) { line.style.display = 'block'; line.style.top = pos + 'px'; volText.innerText = (wall.v * wall.p / 1000000).toFixed(2) + 'M'; }
        else line.style.display = 'none';
    }

    function stopIntervals() { clearInterval(pInt); clearInterval(lInt); clearInterval(tInt); timeLeft = 30; }
    function goBack() { switchTab('search'); }

    async function checkAuth() {
        const savedKey = localStorage.getItem('sz_ultimate_v1_key');
        if (savedKey) { const doc = await db.collection("users").doc(savedKey).get(); if (doc.exists) showSearch(); }
    }
    async function activate() { 
        const k = document.getElementById('pass-key').value;
        const doc = await db.collection("users").doc(k).get();
        if (doc.exists) { localStorage.setItem('sz_ultimate_v1_key', k); showSearch(); }
    }
    async function showSearch() { 
        document.getElementById('auth-screen').style.display = 'none'; switchTab('search'); 
        const res = await fetch(`${BASE_URL}/exchangeInfo`); const data = await res.json();
        allCoins = data.symbols.filter(s => s.contractType === 'PERPETUAL').map(s => s.symbol);
    }
    function searchCoins() {
        const query = document.getElementById('search-input').value.toUpperCase();
        const list = document.getElementById('results-list'); list.innerHTML = '';
        allCoins.filter(c => c.includes(query)).slice(0, 10).forEach(c => {
            const item = document.createElement('div'); item.className = 'coin-item';
            item.innerHTML = `<span>${c}</span><button onclick="startRadar('${c}')">تحليل 🔭</button>`;
            list.appendChild(item);
        });
    }
</script>
</body>
</html>
