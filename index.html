<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار سيزار PRO - V27</title>
    <style>
        :root { --gold: #fbbf24; --card: #121212; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; text-align: right; }
        
        /* شاشة القفل */
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #050505; margin-top: 15vh; border-radius: 20px; width: 300px; box-shadow: 0 0 20px rgba(251, 191, 36, 0.1); }
        .secure-title { color: var(--gold); font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .secure-warn { color: #888; font-size: 11px; margin-bottom: 25px; line-height: 1.5; text-align: center; }
        input.pass { background: #111; border: 1px solid #444; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 90%; outline: none; border-radius: 8px; font-weight: bold; }
        button.btn { background: var(--gold); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; transition: 0.3s; }
        .ext-contact { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .ext-contact a { color: var(--gold); text-decoration: none; font-size: 10px; border: 1px solid #333; padding: 5px 10px; border-radius: 5px; }

        /* شاشة البحث */
        #search-screen { display: none; width: 100%; max-width: 450px; text-align: center; margin-top: 20px; }
        .sezar-style { color: var(--gold); letter-spacing: 2px; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); font-size: 24px; margin-bottom: 25px; }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px; width: 95%; border-radius: 15px; font-size: 16px; outline: none; text-align: center; margin-bottom: 30px; }

        /* بطاقات العملات */
        #results-list { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .coin-item { background: var(--card); border: 1px solid #222; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .coin-item:hover { border-color: var(--gold); background: #1a1a1a; }
        .coin-info { display: flex; align-items: center; gap: 15px; flex-direction: row-reverse; }
        .coin-logo { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .coin-texts { display: flex; flex-direction: column; text-align: left; }
        .coin-symbol { font-weight: bold; font-size: 16px; color: #fff; }
        .coin-name { font-size: 10px; color: #666; }
        .analyze-btn { color: var(--gold); font-size: 12px; font-weight: bold; }

        /* واجهة الرادار */
        #radar-ui { display: none; width: 100%; max-width: 450px; padding-bottom: 80px; }
        .header { border: 2px double var(--gold); padding: 15px; text-align: center; margin-bottom: 20px; position: relative; border-radius: 10px; }
        .back-btn { position: absolute; left: 10px; top: 15px; background: var(--gold); color: #000; border: none; padding: 5px 12px; cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 12px; }
        .price-box { border: 1px dashed #555; padding: 25px; text-align: center; font-size: 30px; font-weight: bold; margin-bottom: 20px; background: #080808; color: #00d2ff; border-radius: 15px; }
        .gauge-container { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 25px; }
        .force-labels { display: flex; justify-content: space-between; font-weight: bold; font-size: 12px; margin-bottom: 10px; }
        .force-bar-bg { background: #111; height: 12px; width: 100%; border-radius: 6px; overflow: hidden; position: relative; }
        #force-bar-fill { background: linear-gradient(90deg, #ef4444, var(--gold), #22c55e); height: 100%; width: 50%; transition: 0.5s; }
        .bar-mid { position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: #444; z-index: 10; }
        .row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 14px 5px; border-bottom: 1px solid #111; }
        .perc-tag { color: var(--gold); font-weight: bold; font-size: 11px; background: rgba(251, 191, 36, 0.1); padding: 2px 8px; border-radius: 10px; border: 0.5px solid rgba(251, 191, 36, 0.3); }
        #sig-box { text-align: center; font-weight: bold; padding: 18px; margin-top: 25px; border-radius: 10px; font-size: 16px; }
        .sig-bullish { background: #064e3b; color: #22c55e; border: 1px solid #22c55e; }
        .sig-bearish { background: #450a0a; color: #ef4444; border: 1px solid #ef4444; }
        .contact-dev { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.95); padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; z-index: 100; }
        .contact-dev a { color: var(--gold); text-decoration: none; font-size: 11px; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen" class="lock-box">
        <div class="secure-title">🔒 قفـل البصمة الرقمية</div>
        <div class="secure-warn">هذا الكود يعمل على جهاز واحد فقط<br>ولن يعمل على غيره نهائياً</div>
        <input type="password" id="pass-key" class="pass" placeholder="أدخل كود التفعيل">
        <button onclick="activate()" class="btn">تسجيل الدخول</button>
        <div class="ext-contact">
            <a href="https://t.me/se44se" target="_blank">✈️ تليجرام</a>
            <a href="mailto:sezarphantom@gmail.com">📧 الإيميل</a>
        </div>
    </div>

    <div id="search-screen">
        <h2 class="sezar-style">「 المطور سيزار 」</h2>
        <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث عن عملة..." oninput="searchCoins()">
        <div id="results-list"></div>
    </div>

    <div id="radar-ui">
        <div class="header">
            <button class="back-btn" onclick="goBack()">🔙 بحث</button>
            <h2 class="sezar-style">「 رادار سيزار PRO 」</h2>
            <p id="current-coin-name" style="color:var(--gold);">[ BTCUSDT ]</p>
        </div>
        <div class="price-box" id="coin-price">Loading...</div>
        <div class="gauge-container">
            <div class="force-labels">
                <span id="force-sell" style="color:#ef4444;">🔴 بيع: --%</span>
                <span id="force-buy" style="color:#22c55e;">🟢 شراء: --%</span>
            </div>
            <div class="force-bar-bg"><div class="bar-mid"></div><div id="force-bar-fill"></div></div>
        </div>
        <div id="s-walls"></div>
        <div id="b-walls" style="margin-top:20px;"></div>
        <div id="sig-box">ANALYZING...</div>
        <div class="contact-dev">
            <a href="https://t.me/se44se" target="_blank">✈️ تليجرام</a>
            <a href="mailto:sezarphantom@gmail.com">📧 الإيميل</a>
        </div>
    </div>

    <script>
        const SYSTEM_VERSION = "PRO_V_TOTAL_V27"; 
        const KEYS = ["SZ_01", "SZ_02", "SZ_03", "SZ_04", "SZ_05"];
        let currentSymbol = 'BTCUSDT', allCoins = [], pInt, lInt;
        const fallbackLogo = "https://www.binance.com/image/common/logo-mini.svg";

        window.onload = function() {
            if (localStorage.getItem('sz_pro_activated') === 'true' && localStorage.getItem('sz_pro_version') === SYSTEM_VERSION) {
                showSearch();
            } else { document.getElementById('auth-screen').style.display = 'block'; }
        };

        function activate() {
            if (KEYS.includes(document.getElementById('pass-key').value)) {
                localStorage.setItem('sz_pro_activated', 'true');
                localStorage.setItem('sz_pro_version', SYSTEM_VERSION);
                showSearch();
            } else { alert("الكود خطأ!"); }
        }

        async function showSearch() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('search-screen').style.display = 'block';
            document.getElementById('radar-ui').style.display = 'none';
            if (allCoins.length === 0) {
                const res = await fetch('https://api.binance.com/api/v3/exchangeInfo');
                const data = await res.json();
                allCoins = data.symbols.filter(s => s.status === 'TRADING' && s.symbol.endsWith('USDT'));
            }
            searchCoins();
        }

        function searchCoins() {
            const query = document.getElementById('search-input').value.toUpperCase();
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            allCoins.filter(c => c.symbol.includes(query)).slice(0, 15).forEach(c => {
                const s = c.symbol.replace('USDT', '');
                const item = document.createElement('div');
                item.className = 'coin-item';
                const logoUrl = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${s.toLowerCase()}.png`;

                item.innerHTML = `
                    <div class="coin-info">
                        <img src="${logoUrl}" class="coin-logo" onerror="this.src='${fallbackLogo}'">
                        <div class="coin-texts">
                            <span class="coin-symbol">${s}</span>
                            <span class="coin-name">${c.symbol}</span>
                        </div>
                    </div>
                    <div class="analyze-btn">تحليل 🔭</div>
                `;
                item.onclick = () => startRadar(c.symbol);
                list.appendChild(item);
            });
        }

        function startRadar(symbol) {
            currentSymbol = symbol;
            document.getElementById('search-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            document.getElementById('current-coin-name').innerText = `[ ${symbol} ]`;
            clearInterval(pInt); clearInterval(lInt);
            updatePrice(); updateLiquidity();
            pInt = setInterval(updatePrice, 1000);
            lInt = setInterval(updateLiquidity, 30000);
        }

        function goBack() { showSearch(); }

        async function updatePrice() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${currentSymbol}`);
                const data = await res.json();
                let p = parseFloat(data.price);
                document.getElementById('coin-price').innerText = '$' + p.toLocaleString(undefined, {minimumFractionDigits: p < 1 ? 5 : 2});
            } catch (e) {}
        }

        async function updateLiquidity() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentSymbol}&limit=5000`);
                const data = await res.json();
                let bids = data.bids.map(b => ({p: parseFloat(b[0]), liq: parseFloat(b[0]) * parseFloat(b[1])}));
                let asks = data.asks.map(a => ({p: parseFloat(a[0]), liq: parseFloat(a[0]) * parseFloat(a[1])}));
                let tB = bids.reduce((s,b)=>s+b.liq,0), tS = asks.reduce((s,a)=>s+a.liq,0);
                let whaleAsks = [...asks].sort((a,b) => b.liq - a.liq).slice(0, 3).sort((a,b) => a.p - b.p);
                let whaleBids = [...bids].sort((a,b) => b.liq - a.liq).slice(0, 3).sort((a,b) => b.p - a.p);
                document.getElementById('s-walls').innerHTML = `<div style="color:#ef4444; font-weight:bold; border-bottom:1px solid #333; padding-bottom:5px;">🔴 SELL WALLS (30s):</div>` + 
                whaleAsks.map(a => `<div class="row"><span>Vol: ${(a.liq/1000000).toFixed(2)}M</span><span class="perc-tag">${((a.liq / tS) * 100).toFixed(2)}%</span><span>$${a.p.toFixed(a.p < 1 ? 5 : 2)} 🎯</span></div>`).join('');
                document.getElementById('b-walls').innerHTML = `<div style="color:#22c55e; font-weight:bold; border-bottom:1px solid #333; padding-bottom:5px;">🟢 BUY WALLS (30s):</div>` + 
                whaleBids.map(b => `<div class="row"><span>Vol: ${(b.liq/1000000).toFixed(2)}M</span><span class="perc-tag">${((b.liq / tB) * 100).toFixed(2)}%</span><span>$${b.p.toFixed(b.p < 1 ? 5 : 2)} 🛡️</span></div>`).join('');
                let buyP = (tB/(tB+tS)*100);
                document.getElementById('force-buy').innerText = "🟢 شراء: " + buyP.toFixed(1) + "%";
                document.getElementById('force-sell').innerText = "🔴 بيع: " + (100-buyP).toFixed(1) + "%";
                document.getElementById('force-bar-fill').style.width = buyP + "%";
                const sig = document.getElementById('sig-box');
                if (buyP > 50) { sig.innerText = "🟢 SIGNAL: BULLISH"; sig.className = "sig-bullish"; }
                else { sig.innerText = "🔴 SIGNAL: BEARISH"; sig.className = "sig-bearish"; }
            } catch (e) {}
        }
    </script>
</body>
</html>
