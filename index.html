<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #080808; --red: #ef4444; --green: #22c55e; }
        #zoom-wrapper { width: 100vw; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #zoom-container { transition: transform 0.3s ease; transform-origin: top center; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .inline-btn { background: rgba(251, 191, 36, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 2px 6px; border-radius: 4px; font-size: 10px; cursor: pointer; vertical-align: middle; margin: 0 5px; }
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-x: hidden; }
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; }
        .secure-note { color: #888; font-size: 11px; margin-bottom: 15px; line-height: 1.6; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; outline: none; border-radius: 5px; font-size: 18px; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; margin-bottom: 20px; }
        #search-screen, #scanner-screen, #whale-hunt-screen { display: none; width: 100%; max-width: 450px; text-align: center; margin-top: 20px; }
        .sezar-brand { margin-bottom: 30px; }
        .sezar-brand .sub-text { font-size: 28px; font-weight: bold; color: var(--gold); text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px; width: 95%; border-radius: 15px; font-size: 16px; outline: none; text-align: center; margin-bottom: 30px; }
        .coin-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .coin-type { font-size: 9px; padding: 2px 5px; border-radius: 3px; margin-right: 5px; }
        #radar-ui { display: none; width: 100%; max-width: 450px; padding-bottom: 80px; position: relative; }
        .header { border: 1px solid var(--gold); padding: 5px; text-align: center; margin-bottom: 15px; border-radius: 5px; position: relative; }
        .back-btn { position: absolute; left: 8px; top: 8px; background: var(--gold); color: #000; border: none; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .price-box { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 32px; font-weight: 900; margin-bottom: 5px; background: #0a0a0a; color: #00d2ff; }
        #chart-container { width: 100%; height: 350px; border: 1px solid #222; border-radius: 10px; background: #000; margin: 15px 0; overflow: hidden; position: relative; }
        #chart-frame { width: 100%; height: 100%; border: none; }
        .chart-wall-line { position: absolute; left: 0; width: 100%; height: 2px; z-index: 10; pointer-events: none; transition: top 0.3s ease; }
        #sell-wall-line .wall-label { position: absolute; right: 80px; top: -18px; font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 3px; background: rgba(0,0,0,0.85); border: 1px solid currentColor; white-space: nowrap; }
        #buy-wall-line .wall-label { position: absolute; right: 80px; top: 2px; font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 3px; background: rgba(0,0,0,0.85); border: 1px solid currentColor; white-space: nowrap; }
        .timer-text { text-align:center; font-size:10px; color: var(--gold); margin-bottom: 12px; font-weight: bold; }
        #buy-sell-per { text-align:center; font-weight:bold; margin-bottom:10px; font-size: 14px; }
        #power-bar { text-align:center; margin-bottom:20px; display: flex; justify-content: center; gap: 4px; }
        .ball { width: 12px; height: 12px; border-radius: 50%; }

        .whale-live-box { background: rgba(8, 8, 8, 0.9); border: 1px solid var(--gold); border-radius: 10px; padding: 12px; margin: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .whale-col { flex: 1; text-align: center; }
        .whale-label { font-size: 8px; color: #888; margin-bottom: 4px; }
        .whale-val { font-size: 14px; font-weight: bold; }
        .whale-sub { font-size: 9px; margin-top: 2px; }

        .row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 13px; font-weight: bold; }
        .ice-card { background: var(--card); border: 1px solid var(--ghost); padding: 15px; border-radius: 12px; margin-top: 20px; width: 100%; box-sizing: border-box; }
        .ai-signal-box { background: linear-gradient(45deg, #080808, #111); border: 1px double var(--gold); border-radius: 10px; padding: 15px; margin: 15px 0; text-align: center; }
        #ai-decision { font-size: 18px; font-weight: 900; margin: 5px 0; }
        .ai-meta { display: flex; justify-content: space-around; font-size: 10px; color: #888; margin-top: 5px; }
        #sig-box { text-align: center; font-weight: bold; padding: 15px; margin-top: 30px; border-radius: 5px; font-size: 16px; }
        .sig-bullish { background: #064e3b; color: #22c55e; border: 1px solid #22c55e; }
        .sig-bearish { background: #450a0a; color: #ef4444; border: 1px solid #ef4444; }
        
        .nav-tabs { display: flex; gap: 5px; width: 95%; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px 5px; border-radius: 8px; border: 1px solid var(--gold); background: #000; color: var(--gold); font-weight: bold; cursor: pointer; font-size: 11px; }
        .tab-btn.active { background: var(--gold); color: #000; }

        .scan-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .hunt-label-box { display: inline-flex; align-items: center; gap: 4px; background: rgba(34, 197, 94, 0.1); border: 1px solid var(--green); padding: 2px 6px; border-radius: 4px; color: var(--green); font-size: 9px; font-weight: 900; vertical-align: middle; }
        .whale-alert { border-color: var(--gold) !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); }
        .contact-dev { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; z-index: 100; }
        .contact-dev a { color: var(--gold); text-decoration: none; font-size: 11px; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body onload="checkAuth()">
<div id="zoom-wrapper">
    <div id="zoom-container">
        <div id="auth-screen" class="lock-box">
            <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 تفعيل SEZAR-PHANTOM PRO</div>
            <input type="password" id="pass-key" class="pass" placeholder="•••••">
            <button onclick="activate()" class="login-btn">تسجيل دخول</button>
        </div>

        <div id="search-screen">
            <div class="sezar-brand"><span class="sub-text">「 SEZAR-PHANTOM 」</span></div>
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('search')">🔍 بحث</button>
                <button class="tab-btn" onclick="switchTab('scanner')">🛰️ القناص (ميم)</button>
                <button class="tab-btn" onclick="switchTab('whale-hunt')">🐋 صيد الحيتان</button>
            </div>
            <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث..." oninput="searchCoins()">
            <div id="results-list"></div>
        </div>

        <div id="scanner-screen">
            <div class="nav-tabs">
                <button class="tab-btn" onclick="switchTab('search')">🔍 بحث</button>
                <button class="tab-btn active" onclick="switchTab('scanner')">🛰️ القناص (ميم)</button>
                <button class="tab-btn" onclick="switchTab('whale-hunt')">🐋 صيد الحيتان</button>
            </div>
            <div id="scanner-list"></div>
        </div>

        <div id="whale-hunt-screen">
            <div class="nav-tabs">
                <button class="tab-btn" onclick="switchTab('search')">🔍 بحث</button>
                <button class="tab-btn" onclick="switchTab('scanner')">🛰️ القناص (ميم)</button>
                <button class="tab-btn active" onclick="switchTab('whale-hunt')">🐋 صيد الحيتان</button>
            </div>
            <div id="whale-hunt-list"></div>
        </div>

        <div id="radar-ui">
            <div class="header">
                <button class="back-btn" onclick="goBack()">🔙 رجوع</button>
                <h2 id="radar-title">「 SEZAR-PHANTOM 」</h2>
                <p id="current-coin-name" style="font-size:11px; margin:0;">[ BTCUSDT ]</p>
            </div>
            <div class="price-box" id="coin-price">Loading...</div>
            <div id="chart-container"><iframe id="chart-frame" src=""></iframe></div>
            <div class="whale-live-box">
                <div class="whale-col">
                    <div class="whale-label">SHORT WHALES</div>
                    <div id="sw-count-whale" class="whale-val" style="color:var(--red)">--</div>
                </div>
                <div class="whale-col" style="border-left:1px solid #222; border-right:1px solid #222;">
                    <div class="whale-label">NET RATIO</div>
                    <div id="net-perc" class="whale-val" style="color:var(--gold)">0.0%</div>
                </div>
                <div class="whale-col">
                    <div class="whale-label">LONG WHALES</div>
                    <div id="lw-count" class="whale-val" style="color:var(--green)">--</div>
                </div>
            </div>
            <div class="ai-signal-box">
                <div style="font-size:11px;color:var(--gold);font-weight:bold;margin-bottom:8px;">🤖 CAESAR SIGNAL AI</div>
                <div id="ai-decision">ANALYZING...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY", authDomain: "sezar-phantom-auth.firebaseapp.com", projectId: "sezar-phantom-auth", storageBucket: "sezar-phantom-auth.firebasestorage.app", messagingSenderId: "112991314655", appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentSymbol = 'BTCUSDT', currentMode = 'spot', allCoins = [], timeLeft = 30, currentPrice = 0, lastVolMap = new Map(), huntInt, scanInt;

    function switchTab(tab) {
        document.getElementById('search-screen').style.display = tab === 'search' ? 'block' : 'none';
        document.getElementById('scanner-screen').style.display = tab === 'scanner' ? 'block' : 'none';
        document.getElementById('whale-hunt-screen').style.display = tab === 'whale-hunt' ? 'block' : 'none';
        document.getElementById('radar-ui').style.display = tab === 'radar' ? 'block' : 'none';
        clearInterval(huntInt); clearInterval(scanInt);
        if(tab === 'scanner') scanInt = setInterval(updateScanner, 5000);
        if(tab === 'whale-hunt') { updateWhaleHunt(); huntInt = setInterval(updateWhaleHunt, 10000); }
    }

    async function updateWhaleHunt() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            const data = await res.json();
            const list = document.getElementById('whale-hunt-list');
            let candidates = data.filter(c => {
                const change = parseFloat(c.priceChangePercent);
                const volume = parseFloat(c.quoteVolume);
                return c.symbol.endsWith('USDT') && change >= -1 && change <= 3 && volume > 10000000;
            }).map(c => {
                const vol = parseFloat(c.quoteVolume);
                const score = (vol / 50000000) + (parseFloat(c.priceChangePercent) * 2);
                return { ...c, huntScore: score };
            }).sort((a,b) => b.huntScore - a.huntScore).slice(0, 10);

            let html = '';
            candidates.forEach(c => {
                html += `<div class="scan-item ${c.huntScore > 5 ? 'whale-alert' : ''}">
                    <div style="text-align:right">
                        <div style="color:var(--gold); font-weight:bold; font-size:16px;">
                            ${c.symbol} <span class="hunt-label-box">ACCUMULATION 🔥 🐋</span>
                        </div>
                        <div style="color:var(--green); font-size:11px; margin-top:4px;">PRE-EXPLOSION: +5% ~ +15%</div>
                        <div style="color:#888; font-size:10px;">VOL: ${(parseFloat(c.quoteVolume)/1000000).toFixed(1)}M | CHG: ${c.priceChangePercent}%</div>
                    </div>
                    <button onclick="startRadar('${c.symbol}', 'spot')" style="background:var(--green); color:#000; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">صيد 🎯</button>
                </div>`;
            });
            list.innerHTML = html;
        } catch (e) {}
    }

    // باقي الوظائف (activate, showSearch, startRadar, إلخ) كما هي تماماً
    async function checkAuth() { if (localStorage.getItem('sz_ultimate_v1_key')) showSearch(); }
    async function activate() { const k = document.getElementById('pass-key').value; if(k) { localStorage.setItem('sz_ultimate_v1_key', k); showSearch(); } }
    async function showSearch() {
        document.getElementById('auth-screen').style.display = 'none';
        switchTab('search');
        const res = await fetch('https://api.binance.com/api/v3/exchangeInfo');
        const data = await res.json();
        allCoins = data.symbols.filter(s => s.symbol.endsWith('USDT')).map(s => ({s: s.symbol, m: 'spot'}));
        searchCoins();
    }
    function searchCoins() {
        const query = document.getElementById('search-input').value.toUpperCase();
        const list = document.getElementById('results-list');
        list.innerHTML = '';
        allCoins.filter(c => c.s.includes(query)).slice(0, 10).forEach(c => {
            const item = document.createElement('div');
            item.className = 'coin-item';
            item.innerHTML = `<div><span class="coin-type" style="border:1px solid var(--ghost); color:var(--ghost)">SPOT</span><span style="font-weight:bold;">${c.s}</span></div><div style="color:var(--gold); font-size:11px;">تحليل 🔭</div>`;
            item.onclick = () => startRadar(c.s, c.m);
            list.appendChild(item);
        });
    }
    function startRadar(symbol, mode) {
        currentSymbol = symbol; currentMode = mode; switchTab('radar');
        document.getElementById('current-coin-name').innerText = `[ ${symbol} ]`;
        document.getElementById('chart-frame').src = `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}&interval=1&theme=dark`;
    }
    function goBack() { switchTab('search'); }
</script>
</body>
</html>
